name: CyberWatch — Security Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 01 — SAST : Bandit + Semgrep
  # ══════════════════════════════════════════════════════════════════════════
  sast:
    name: "01 · SAST — Bandit + Semgrep"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install bandit semgrep

      - name: Bandit
        run: |
          bandit -r . --exclude ./.git,./tests \
            -f json -o bandit-report.json \
            --severity-level medium || true

      - name: Semgrep
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --json --output semgrep-report.json \
            --no-error . || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 02 — SCA : Safety only
  # ══════════════════════════════════════════════════════════════════════════
  sca:
    name: "02 · SCA — Safety"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: |
          pip install safety
          pip install -r requirements.txt

      - name: Safety scan
        run: |
          safety check --json --output safety-report.json || true
          safety check || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: safety-report.json

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 03 — Hadolint
  # ══════════════════════════════════════════════════════════════════════════
  hadolint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          curl -fsSL \
          "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64" \
          -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - run: |
          hadolint Dockerfile --format json > hadolint-report.json || true
          hadolint Dockerfile --failure-threshold warning

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 04 — Kubesec
  # ══════════════════════════════════════════════════════════════════════════
  kubesec:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          curl -sSL \
          "https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz" \
          | tar xz -C /tmp
          sudo mv /tmp/kubesec /usr/local/bin/kubesec

      - run: kubesec scan k8s/deployment.yaml > kubesec-report.json || true

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 05 — Checkov
  # ══════════════════════════════════════════════════════════════════════════
  checkov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: pip install checkov

      - run: |
          checkov -f k8s/deployment.yaml \
            --framework kubernetes \
            --output json \
            --output-file checkov-k8s-report.json \
            --soft-fail || true

      - run: |
          checkov -f Dockerfile \
            --framework dockerfile \
            --output json \
            --output-file checkov-dockerfile-report.json \
            --soft-fail || true

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 06 — Build
  # ══════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: [sast, sca, hadolint, kubesec, checkov]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: |
          docker build -t cyberwatch:${{ github.sha }} .
          docker save cyberwatch:${{ github.sha }} | gzip > cyberwatch.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: cyberwatch.tar.gz

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 07 — Trivy
  # ══════════════════════════════════════════════════════════════════════════
  trivy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load < cyberwatch.tar.gz

      - run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            cyberwatch:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 08 — SBOM
  # ══════════════════════════════════════════════════════════════════════════
  sbom:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load < cyberwatch.tar.gz

      - run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin

      - run: |
          syft cyberwatch:${{ github.sha }} -o cyclonedx-json > sbom.json

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 09 — Smoke Test
  # ══════════════════════════════════════════════════════════════════════════
  smoke-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: |
          docker load < cyberwatch.tar.gz
          docker run -d -p 8080:8080 cyberwatch:${{ github.sha }}

      - run: |
          sleep 10
          curl -f http://localhost:8080/health

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 10 — Sign
  # ══════════════════════════════════════════════════════════════════════════
  sign:
    runs-on: ubuntu-latest
    needs: [trivy, sbom, smoke-test]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load < cyberwatch.tar.gz

      - run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - run: |
          docker tag cyberwatch:${{ github.sha }} \
          ${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
