name: CyberWatch — Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 01 — SAST : Bandit + Semgrep
  # ══════════════════════════════════════════════════════════════════════════
  sast:
    name: "01 · SAST — Bandit + Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Bandit + Semgrep
        run: pip install bandit semgrep

      - name: Bandit — sécurité Python
        run: |
          bandit -r . \
            --exclude ./.git,./tests \
            -f json -o bandit-report.json \
            --severity-level medium || true
          bandit -r . \
            --exclude ./.git,./tests \
            --severity-level medium || true

      - name: Semgrep — OWASP + secrets
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --json --output semgrep-report.json \
            --no-error . || true
          semgrep scan \
            --config "p/python" \
            --config "p/secrets" . || true

      - name: Upload rapports SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 02 — SCA : Safety + Snyk dépendances
  # ══════════════════════════════════════════════════════════════════════════
  sca:
    name: "02 · SCA — Safety + Snyk"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Safety + Snyk
        run: |
          pip install safety
          npm install -g snyk

      - name: Safety — scan rapide
        run: |
          pip install -r requirements.txt
          safety check --json --output safety-report.json || true
          safety check || true

      - name: Snyk — analyse approfondie
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test \
            --file=requirements.txt \
            --package-manager=pip \
            --severity-threshold=high \
            --json --json-file-output=snyk-deps-report.json || true

      - name: Résumé vulnérabilités
        run: |
          python3 << 'PYEOF'
          import json

          for fname, label in [('safety-report.json','Safety'),('snyk-deps-report.json','Snyk')]:
              try:
                  with open(fname) as f: data = json.load(f)
                  vulns = data.get('vulnerabilities', [])
                  high = [v for v in vulns if v.get('severity') in ('high','critical')]
                  print(f"{label}: {len(vulns)} total | {len(high)} HIGH/CRITICAL")
              except Exception as e:
                  print(f"{label}: {e}")
          PYEOF

      - name: Upload rapports SCA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            safety-report.json
            snyk-deps-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 03 — Hadolint : lint du Dockerfile
  # ══════════════════════════════════════════════════════════════════════════
  hadolint:
    name: "03 · Hadolint — Dockerfile Lint"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Hadolint
        run: |
          curl -fsSL \
            "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Scan Hadolint
        run: |
          hadolint Dockerfile --format json | tee hadolint-report.json || true
          hadolint Dockerfile --failure-threshold warning

      - name: Upload rapport Hadolint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hadolint-report
          path: hadolint-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 04 — Kubesec : score de sécurité du manifeste Kubernetes
  # ══════════════════════════════════════════════════════════════════════════
  kubesec:
    name: "04 · Kubesec — K8s Manifest Score"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Kubesec
        run: |
          curl -sSL \
            "https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz" \
            | tar xz -C /tmp
          sudo mv /tmp/kubesec /usr/local/bin/kubesec

      - name: Scan Kubesec
        run: |
          kubesec scan k8s/deployment.yaml | tee kubesec-report.json
          python3 << 'PYEOF'
          import json, sys

          with open('kubesec-report.json') as f:
              results = json.load(f)

          failed = False
          for r in results:
              score = r.get('score', 0)
              obj   = r.get('object', 'unknown')
              print(f"  {obj}: score={score}")
              if score < 0:
                  print(f"  ECHEC: score négatif pour {obj}")
                  failed = True

          if failed:
              sys.exit(1)
          print("Scores Kubesec OK.")
          PYEOF

      - name: Upload rapport Kubesec
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kubesec-report
          path: kubesec-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 05 — Checkov : politique de sécurité Kubernetes + Dockerfile
  # ══════════════════════════════════════════════════════════════════════════
  checkov:
    name: "05 · Checkov — K8s + Dockerfile Policy"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Checkov
        run: pip install checkov

      - name: Checkov — manifeste Kubernetes
        run: |
          checkov \
            -f k8s/deployment.yaml \
            --framework kubernetes \
            --output json \
            --output-file checkov-k8s-report.json \
            --soft-fail || true

      - name: Checkov — Dockerfile
        run: |
          checkov \
            -f Dockerfile \
            --framework dockerfile \
            --output json \
            --output-file checkov-dockerfile-report.json \
            --soft-fail || true

      - name: Résumé Checkov
        run: |
          python3 << 'PYEOF'
          import json, glob

          for fname in glob.glob('checkov-*.json'):
              label = fname.replace('checkov-','').replace('-report.json','')
              try:
                  with open(fname) as f: data = json.load(f)
                  r = data.get('results', {})
                  passed = len(r.get('passed_checks', []))
                  failed = len(r.get('failed_checks', []))
                  print(f"Checkov [{label}] — Passés: {passed} | Échoués: {failed}")
                  for c in r.get('failed_checks', [])[:3]:
                      print(f"  [{c.get('check_id','')}] {c.get('resource','')}")
              except Exception as e:
                  print(f"Checkov [{label}]: {e}")
          PYEOF

      - name: Upload rapports Checkov
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-reports
          path: |
            checkov-k8s-report.json
            checkov-dockerfile-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 06 — Build : image Docker multi-stage
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "06 · Build — Docker Multi-Stage"
    runs-on: ubuntu-latest
    needs: [sast, sca, hadolint, kubesec, checkov]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t cyberwatch:${{ github.sha }} .

          docker save cyberwatch:${{ github.sha }} | gzip > cyberwatch.tar.gz

          echo "Image buildée :"
          docker images cyberwatch:${{ github.sha }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: cyberwatch.tar.gz
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 07 — Trivy : scan de vulnérabilités de l'image
  # ══════════════════════════════════════════════════════════════════════════
  trivy:
    name: "07 · Trivy — CVE Image Scan"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Installer Trivy
        run: |
          sudo apt-get update -qq
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq trivy

      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image
        run: docker load < cyberwatch.tar.gz

      - name: Rapport JSON complet
        run: |
          trivy image \
            --format json \
            --output trivy-full.json \
            --exit-code 0 \
            cyberwatch:${{ github.sha }}

      - name: Rapport table HIGH/CRITICAL
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --output trivy-summary.txt \
            --exit-code 0 \
            cyberwatch:${{ github.sha }}
          cat trivy-summary.txt

      - name: Métriques CVE
        id: cve
        run: |
          python3 << 'PYEOF'
          import json, os

          with open('trivy-full.json') as f:
              data = json.load(f)

          counts = {}
          for result in data.get('Results', []):
              for v in result.get('Vulnerabilities', []):
                  s = v.get('Severity', 'UNKNOWN')
                  counts[s] = counts.get(s, 0) + 1

          for sev in ['CRITICAL','HIGH','MEDIUM','LOW']:
              print(f"{sev}: {counts.get(sev, 0)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"critical={counts.get('CRITICAL',0)}\n")
              out.write(f"high={counts.get('HIGH',0)}\n")
              out.write(f"medium={counts.get('MEDIUM',0)}\n")
          PYEOF

      - name: Enforcement — bloquer si HIGH ou CRITICAL
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet \
            cyberwatch:${{ github.sha }}

      - name: Upload rapports Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-full.json
            trivy-summary.txt
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 08 — Snyk image : analyse dépendances dans l'image
  # ══════════════════════════════════════════════════════════════════════════
  snyk-image:
    name: "08 · Snyk — Container Image Scan"
    runs-on: ubuntu-latest
    needs: build
    if: vars.SNYK_TOKEN != ''
    permissions:
      contents: read

    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image
        run: docker load < cyberwatch.tar.gz

      - name: Installer Snyk
        run: npm install -g snyk

      - name: Snyk container scan
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk container test \
            cyberwatch:${{ github.sha }} \
            --severity-threshold=high \
            --json \
            --json-file-output=snyk-image-report.json || true

      - name: Résumé Snyk image
        run: |
          python3 << 'PYEOF'
          import json

          try:
              with open('snyk-image-report.json') as f:
                  data = json.load(f)
              vulns = data.get('vulnerabilities', [])
              high  = [v for v in vulns if v.get('severity') in ('high','critical')]
              print(f"Snyk image: {len(vulns)} total | {len(high)} HIGH/CRITICAL")
              for v in high[:5]:
                  print(f"  [{v.get('severity','?').upper()}] {v.get('packageName','?')} — {v.get('title','?')[:70]}")
          except Exception as e:
              print(f"Snyk image: {e}")
          PYEOF

      - name: Upload rapport Snyk image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-image-report
          path: snyk-image-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 09 — SBOM : inventaire CycloneDX + SPDX (Syft)
  # ══════════════════════════════════════════════════════════════════════════
  sbom:
    name: "09 · SBOM — Syft (CycloneDX + SPDX)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image
        run: docker load < cyberwatch.tar.gz

      - name: Installer Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Générer SBOM CycloneDX
        run: |
          syft cyberwatch:${{ github.sha }} \
            -o cyclonedx-json > sbom-cyclonedx.json

          python3 << 'PYEOF'
          import json

          with open('sbom-cyclonedx.json') as f:
              data = json.load(f)
          comps = data.get('components', [])
          by_type = {}
          for c in comps:
              t = c.get('type','unknown')
              by_type[t] = by_type.get(t, 0) + 1
          print(f"SBOM CycloneDX — {len(comps)} composants")
          for k, v in sorted(by_type.items(), key=lambda x: -x[1]):
              print(f"  {k}: {v}")
          PYEOF

      - name: Générer SBOM SPDX
        run: |
          syft cyberwatch:${{ github.sha }} \
            -o spdx-json > sbom-spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 10 — Smoke Test : run + test de tous les endpoints
  # ══════════════════════════════════════════════════════════════════════════
  smoke-test:
    name: "10 · Smoke Test — Endpoints"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger et lancer le conteneur
        run: |
          docker load < cyberwatch.tar.gz

          docker run -d \
            --name cyberwatch-test \
            -p 8080:8080 \
            --read-only \
            --tmpfs /tmp \
            --user 1000:1000 \
            cyberwatch:${{ github.sha }}

          # Attendre le démarrage (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Conteneur prêt après ${i}s"
              break
            fi
            sleep 1
          done

      - name: Tester /health
        run: |
          RESP=$(curl -sf http://localhost:8080/health)
          echo "Response: $RESP"
          echo "$RESP" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'status != ok: {d}'
          print('PASS /health')
          "

      - name: Tester /ready
        run: |
          curl -sf http://localhost:8080/ready | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'ready'
          print('PASS /ready')
          "

      - name: Tester /api/stats
        run: |
          curl -sf http://localhost:8080/api/stats | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'threats_blocked' in d
          assert 'uptime' in d
          assert 'threat_score' in d
          print('PASS /api/stats')
          "

      - name: Tester /api/threats
        run: |
          curl -sf 'http://localhost:8080/api/threats?count=5' | python3 -c "
          import json, sys
          ts = json.load(sys.stdin)
          assert len(ts) == 5, f'attendu 5, obtenu {len(ts)}'
          assert 'severity' in ts[0]
          assert 'ip' in ts[0]
          assert 'blocked' in ts[0]
          print('PASS /api/threats')
          "

      - name: Tester /api/timeline
        run: |
          curl -sf http://localhost:8080/api/timeline | python3 -c "
          import json, sys
          tl = json.load(sys.stdin)
          assert len(tl) > 0
          assert 'critical' in tl[0]
          print('PASS /api/timeline')
          "

      - name: Tester page principale
        run: |
          STATUS=$(curl -so /dev/null -w '%{http_code}' http://localhost:8080/)
          [ "$STATUS" = "200" ] || (echo "ECHEC: / retourné $STATUS" && exit 1)
          curl -s http://localhost:8080/ | grep -q "CyberWatch" || \
            (echo "ECHEC: CyberWatch absent de la page" && exit 1)
          echo "PASS / — HTTP $STATUS"

      - name: Logs en cas d'échec
        if: failure()
        run: docker logs cyberwatch-test

      - name: Nettoyage
        if: always()
        run: |
          docker stop cyberwatch-test 2>/dev/null || true
          docker rm cyberwatch-test 2>/dev/null || true

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 11 — Sign : push Docker Hub + signature Cosign keyless
  # ══════════════════════════════════════════════════════════════════════════
  sign:
    name: "11 · Push + Cosign Sign"
    runs-on: ubuntu-latest
    needs: [trivy, snyk-image, sbom, smoke-test]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Télécharger l'image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Charger l'image
        run: docker load < cyberwatch.tar.gz

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag et push
        run: |
          docker tag cyberwatch:${{ github.sha }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag cyberwatch:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
            docker push ${{ env.IMAGE_NAME }}:latest
          fi

      - name: Installer Cosign
        uses: sigstore/cosign-installer@v3

      - name: Signer l'image (keyless OIDC)
        run: |
          cosign sign --yes \
            --annotations "repo=${{ github.repository }}" \
            --annotations "sha=${{ github.sha }}" \
            --annotations "workflow=${{ github.workflow }}" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Vérifier la signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer \
              https://token.actions.githubusercontent.com \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            | python3 -m json.tool | head -20

      - name: Résumé
        run: |
          echo "Image publiée  : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Signée avec    : GitHub Actions OIDC (keyless)"
          echo "Dépôt          : ${{ github.repository }}"
          echo "Commit         : ${{ github.sha }}"

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 12 — Notify : notification Discord
  # ══════════════════════════════════════════════════════════════════════════
  notify:
    name: "12 · Discord Notification"
    runs-on: ubuntu-latest
    needs: sign
    if: always() && vars.DISCORD_NOTIFICATIONS == 'true'
    permissions:
      contents: read

    steps:
      - name: Notification Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SIGN_STATUS: ${{ needs.sign.result }}
          REPO:        ${{ github.repository }}
          ACTOR:       ${{ github.actor }}
          SHA:         ${{ github.sha }}
          BRANCH:      ${{ github.ref_name }}
          RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IMAGE:       ${{ secrets.DOCKERHUB_USERNAME }}/cyberwatch
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          status = os.environ['SIGN_STATUS']
          ok     = status == 'success'
          color  = 3066993 if ok else 15158332
          emoji  = 'PASS' if ok else 'FAIL'

          payload = {
            'embeds': [{
              'title': f'[{emoji}] CyberWatch Pipeline — {os.environ["REPO"]}',
              'color': color,
              'url':   os.environ['RUN_URL'],
              'fields': [
                {'name': 'Branche',  'value': f'`{os.environ["BRANCH"]}`',  'inline': True},
                {'name': 'Commit',   'value': f'`{os.environ["SHA"][:8]}`', 'inline': True},
                {'name': 'Auteur',   'value': f'`{os.environ["ACTOR"]}`',   'inline': True},
                {'name': 'Image',    'value': f'`{os.environ["IMAGE"]}:{os.environ["SHA"][:8]}`', 'inline': False},
                {'name': 'Pipeline', 'value': f'[Voir les détails]({os.environ["RUN_URL"]})',     'inline': False},
              ],
              'footer': {
                'text': 'SAST → SCA → Hadolint → Kubesec → Checkov → Build → Trivy → Snyk → SBOM → Smoke → Sign'
              }
            }]
          }

          req = urllib.request.Request(
            os.environ['DISCORD_WEBHOOK_URL'],
            json.dumps(payload).encode(),
            {'Content-Type': 'application/json'},
            method='POST'
          )
          try:
              urllib.request.urlopen(req)
              print('Notification Discord envoyée.')
          except Exception as e:
              print(f'Erreur Discord: {e}')
          PYEOF