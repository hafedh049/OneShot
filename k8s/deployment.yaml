---
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberwatch
  namespace: production
  labels:
    app: cyberwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberwatch
  template:
    metadata:
      labels:
        app: cyberwatch
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cyberwatch
          image: DOCKERHUB_USERNAME/cyberwatch:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: cyberwatch
  namespace: production
spec:
  selector:
    app: cyberwatch
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
  type: NodePort